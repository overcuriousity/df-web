<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dwarf Fortress</title>
<style>
  :root { --bg: #1a1a1a; --fg: #d0c8b0; --accent: #8b7355; --btn: #3a3028; --btn-hover: #5a4a38; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: 'Courier New', monospace;
         display: flex; flex-direction: column; align-items: center; justify-content: center;
         min-height: 100vh; padding: 2rem; }
  h1 { font-size: 1.8rem; letter-spacing: 0.1em; color: #c8a870; margin-bottom: 0.4rem; }
  .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 2.5rem; }
  .card { background: #242018; border: 1px solid #3a3028; border-radius: 4px;
          padding: 1.8rem 2rem; width: 100%; max-width: 380px; }
  h2 { font-size: 1rem; color: var(--accent); margin-bottom: 1.2rem; letter-spacing: 0.05em; }
  label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.4rem; }
  input[type="password"] {
    display: block; width: 100%; padding: 0.6rem 0.8rem; margin-bottom: 0.8rem;
    background: #1a1a1a; color: var(--fg); border: 1px solid var(--accent);
    border-radius: 3px; font-family: inherit; font-size: 0.95rem; }
  input[type="password"]:focus { outline: none; border-color: #c8a870; }
  .btn { display: block; width: 100%; padding: 0.7rem 1rem; margin-bottom: 0.8rem;
         background: var(--btn); color: var(--fg); border: 1px solid var(--accent);
         border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 0.95rem;
         text-align: center; text-decoration: none; transition: background 0.15s; }
  .btn:hover { background: var(--btn-hover); }
  .btn:last-child { margin-bottom: 0; }
  .divider { border: none; border-top: 1px solid #3a3028; margin: 1.2rem 0; }
  #passkey-status { font-size: 0.8rem; color: #888; margin-top: 0.6rem; min-height: 1.2em; }
  .error { color: #c06060; font-size: 0.85rem; margin-top: 1rem; min-height: 1.2em; }
  .bay12 { margin-top: 1.5rem; font-size: 0.8rem; color: #888; text-align: center; max-width: 380px; }
  .bay12 a { color: #8b7355; text-decoration: none; }
  .bay12 a:hover { color: #c8a870; }
  .bay12-support {
    display: inline-block; margin-top: 0.5rem; padding: 0.4rem 0.8rem;
    background: #3a2818; border: 1px solid #c8a870; border-radius: 3px;
    color: #c8a870 !important; text-decoration: none; letter-spacing: 0.05em;
  }
  .bay12-support:hover { background: #5a3a20; color: #f0d090 !important; }
</style>
</head>
<body>

<h1>&#9935; Dwarf Fortress</h1>
<p class="subtitle">Lose yourself in the depths.</p>

<div class="card">
  <h2>[ Login ]</h2>

  <form method="POST" action="/auth/token" autocomplete="off">
    <div style="font-size:0.8rem;color:#888;margin-bottom:0.4rem">Access key</div>
    <input id="key" name="key" type="password" required autofocus
           spellcheck="false" autocapitalize="off" autocomplete="current-password">
    <button class="btn" type="submit">Sign in</button>
  </form>

  <hr class="divider">

  <button class="btn" onclick="passkeyLogin()">&#128273; Login with Passkey / YubiKey</button>
  <p id="passkey-status"></p>

  {{if .OIDCEnabled}}
  <hr class="divider">
  <a class="btn" href="/auth/oidc/login">&#9729; Login with single sign-on</a>
  {{end}}

  <div class="error">{{.Reason}}</div>
</div>

<p class="bay12">
  Dwarf Fortress is the work of
  <a href="https://www.bay12games.com/dwarves/" target="_blank" rel="noopener">Bay 12 Games</a>.
  Two decades of one of the deepest games ever made — please support them.<br>
  <strong><a class="bay12-support" href="https://www.bay12games.com/support.html"
     target="_blank" rel="noopener">&#9733; Buy the game / donate to Bay 12 &#9733;</a></strong>
</p>

<script src="/static/webauthn.js"></script>
<script>
async function passkeyLogin() {
  const status = document.getElementById('passkey-status');
  status.textContent = 'Waiting for authenticator…';
  try {
    const beginResp = await fetch('/auth/passkey/login/begin');
    if (!beginResp.ok) throw new Error(await beginResp.text());
    const options = await beginResp.json();

    options.publicKey.challenge = decodeB64(options.publicKey.challenge);
    if (options.publicKey.allowCredentials) {
      options.publicKey.allowCredentials = options.publicKey.allowCredentials.map(c => ({
        ...c, id: decodeB64(c.id)
      }));
    }

    const credential = await navigator.credentials.get({ publicKey: options.publicKey });
    if (!credential) { status.textContent = 'Cancelled.'; return; }

    const finishResp = await fetch('/auth/passkey/login/finish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(credentialToJSON(credential))
    });
    if (!finishResp.ok) throw new Error(await finishResp.text());
    const result = await finishResp.json();
    status.textContent = 'Authenticated! Redirecting…';
    window.location.href = result.redirect;
  } catch (e) {
    status.textContent = 'Login failed: ' + e.message;
  }
}
</script>
</body>
</html>
