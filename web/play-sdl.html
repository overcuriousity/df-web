<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dwarf Fortress – SDL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #toolbar { background: #1a1a1a; border-bottom: 1px solid #3a3028; padding: 0.4rem 0.8rem;
             display: flex; align-items: center; gap: 1rem; flex-shrink: 0; font-family: monospace; font-size: 0.85rem; color: #888; }
  #toolbar a { color: #8b7355; text-decoration: none; }
  #toolbar a:hover { color: #c8a870; }
  #fs-hint { color: #c8a870; font-size: 0.8rem; }
  #novnc-frame { flex: 1; width: 100%; border: none; }
</style>
</head>
<body>
<div id="toolbar">
  <span>&#9935; Dwarf Fortress</span>
  <span id="fs-hint">Press F11 or click &#x26F6; for fullscreen</span>
  <span style="margin-left:auto">
    <a href="/auth/logout">Logout</a>
  </span>
</div>
<!-- noVNC served by websockify in the container, proxied through /play. -->
<iframe id="novnc-frame"
        src="/novnc/vnc.html?autoconnect=true&reconnect=true&reconnect_delay=2000&path=/play&resize=scale&show_dot=false&bell=false"
        allowfullscreen></iframe>

<script>
// Keyboard Lock API — exclusive capture of system keys in fullscreen (Chromium only).
async function requestKeyboardLock() {
  if (navigator.keyboard && navigator.keyboard.lock) {
    try {
      await navigator.keyboard.lock([
        'Escape','F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12'
      ]);
      document.getElementById('fs-hint').textContent = 'Keyboard captured.';
    } catch (e) {
      document.getElementById('fs-hint').textContent = 'Keyboard lock unavailable.';
    }
  }
}

document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) requestKeyboardLock();
});

document.getElementById('novnc-frame').addEventListener('load', () => {
  document.getElementById('fs-hint').textContent =
    'Click inside the game, then F11 for fullscreen.';
  // Focus the iframe so keyboard events flow to noVNC immediately.
  document.getElementById('novnc-frame').contentWindow.focus();
});
</script>
</body>
</html>
