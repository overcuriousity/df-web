# This compose file manages the session manager only.
# DF game containers are spawned dynamically by the session manager via the Docker socket.

services:
  session-manager:
    build: ./session-manager
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # needed to spawn game containers
      - /srv/df/users:/srv/df/users                   # per-user data/ + config/ live here
      - ./session-manager/config.yml:/app/config.yml:ro
      - ./session-manager/users.yml:/app/users.yml
      - ./web:/app/web:ro
    environment:
      LISTEN: "0.0.0.0:8080"
    networks:
      - df_internal

networks:
  df_internal:
    name: df_internal       # pin: avoid the compose project-name prefix so
                            # `docker run --network df_internal` (issued by the
                            # session-manager) attaches to the same network.
    driver: bridge
